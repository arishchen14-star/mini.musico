<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Music Vault</title>
    <style>
        :root { --bg: #000; --accent: #1DB954; --card: #121212; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .wrapper { width: 100%; max-width: 400px; margin-top: 40px; }
        h1 { font-weight: 200; letter-spacing: 5px; opacity: 0.8; text-align: center; }
        .add-card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #222; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; padding: 12px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--accent); }
        button { width: 100%; background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .song-item { background: var(--card); padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #222; }
        .song-link { color: #fff; text-decoration: none; display: flex; align-items: center; gap: 12px; flex-grow: 1; font-size: 15px; }
        .dot { height: 8px; width: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 5px var(--accent); }
        .del-btn { color: #555; font-size: 11px; cursor: pointer; padding: 5px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>VAULT</h1>
        <div class="add-card">
            <input type="text" id="sName" placeholder="Song Name (e.g. Humdum)">
            <input type="text" id="sLink" placeholder="Paste full ListenFree Link/Msg">
            <button onclick="saveSong()">SAVE TRACK</button>
        </div>
        <div id="vaultDisplay"></div>
    </div>
    <script>
        let myVault = JSON.parse(localStorage.getItem('music_vFinal_v1')) || [];
        render();

        function saveSong() {
            let n = document.getElementById('sName').value;
            let l = document.getElementById('sLink').value;
            let urlRegex = /(https?:\/\/[^\s]+)/g;
            let found = l.match(urlRegex);
            if (n && found) {
                myVault.push({ name: n, link: found[0] });
                localStorage.setItem('music_vFinal_v1', JSON.stringify(myVault));
                document.getElementById('sName').value = '';
                document.getElementById('sLink').value = '';
                render();
            } else { alert("Name aur Link dono chahiye bhai!"); }
        }

        function render() {
            const container = document.getElementById('vaultDisplay');
            container.innerHTML = myVault.length ? "" : "<p style='text-align:center; color:#444; font-size:12px;'>Vault Khali Hai...</p>";
            myVault.forEach((item, i) => {
                container.innerHTML += `<div class="song-item">
                    <a href="${item.link}" target="_blank" class="song-link">
                        <div class="dot"></div>
                        <span>${item.name}</span>
                    </a>
                    <div class="del-btn" onclick="deleteSong(${i})">REMOVE</div>
                </div>`;
            });
        }

        function deleteSong(i) {
            myVault.splice(i, 1);
            localStorage.setItem('music_vFinal_v1', JSON.stringify(myVault));
            render();
        }
    </script>
</body>
</html>
